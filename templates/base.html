<!DOCTYPE html>
<html lang="{{ 'zh-CN' if t and t.lang_target == 'en' else 'en' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>{% block title %}The Root{% endblock %}</title>

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#1a1510" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="The Root" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/static/style.css" />
  <script>window.APP_T = {{ t | tojson if t else '{}' }};</script>
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo">The Root</a>

    <!-- Desktop nav -->
    <nav class="nav-desktop">
      <a href="/settings">{{ t.nav_settings if t else "Settings" }}</a>
      <a href="/plants/new" class="nav-cta">{{ t.nav_add if t else "+ Add" }}</a>
      <form method="post" action="/lang/{{ t.lang_target if t else 'zh' }}" style="display:inline;margin:0">
        <button type="submit" class="nav-lang">{{ t.lang_toggle if t else "中文" }}</button>
      </form>
    </nav>

  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/sw.js");
    }
  </script>
</body>
</html>
