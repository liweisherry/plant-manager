{% extends "base.html" %}
{% block title %}设置{% endblock %}

{% block content %}
<div class="page-header">
  <h1>设置</h1>
</div>

<div class="form-card" style="max-width:560px;">
  <div class="form-section">
    <h2>Gemini API Key</h2>
    <p style="font-size:.88rem;color:var(--gray-600);margin-bottom:1rem;line-height:1.6;">
      AI 识别和养护建议功能需要 Gemini API Key。<br>
      Key 仅保存在你自己的浏览器里，不会上传到服务器。<br>
      <a href="https://aistudio.google.com/apikey" target="_blank"
         style="color:var(--green-600);">→ 免费申请 Gemini API Key</a>
    </p>

    <div class="form-group">
      <label for="gemini-key">API Key</label>
      <div style="display:flex;gap:.5rem;">
        <input id="gemini-key" type="password" placeholder="AIza..."
               style="flex:1;" autocomplete="off" />
        <button id="toggle-visibility" type="button" class="btn btn-ghost btn-sm"
                title="显示/隐藏">👁</button>
      </div>
      <small id="key-status" class="field-hint"></small>
    </div>

    <div style="display:flex;gap:.75rem;flex-wrap:wrap;">
      <button id="save-key" class="btn">保存</button>
      <button id="clear-key" class="btn btn-ghost">清除 Key</button>
      <button id="test-key" class="btn btn-ghost">测试连接</button>
    </div>
  </div>
</div>

<script>
(function () {
  const input   = document.getElementById("gemini-key");
  const status  = document.getElementById("key-status");
  const saveBtn = document.getElementById("save-key");
  const clearBtn= document.getElementById("clear-key");
  const testBtn = document.getElementById("test-key");
  const toggle  = document.getElementById("toggle-visibility");

  // 读取已保存的 Key
  const saved = localStorage.getItem("gemini_api_key") || "";
  if (saved) {
    input.value = saved;
    status.textContent = "✅ 已保存（上次设置）";
  }

  toggle.addEventListener("click", () => {
    input.type = input.type === "password" ? "text" : "password";
  });

  saveBtn.addEventListener("click", () => {
    const key = input.value.trim();
    if (!key) { status.textContent = "⚠️ 请输入 Key"; return; }
    localStorage.setItem("gemini_api_key", key);
    status.textContent = "✅ 已保存";
  });

  clearBtn.addEventListener("click", () => {
    localStorage.removeItem("gemini_api_key");
    input.value = "";
    status.textContent = "🗑 已清除";
  });

  testBtn.addEventListener("click", async () => {
    const key = input.value.trim();
    if (!key) { status.textContent = "⚠️ 请先输入 Key"; return; }
    testBtn.disabled = true;
    status.textContent = "测试中…";
    try {
      const res  = await fetch("/api/test-key", {
        method: "POST",
        headers: { "X-Gemini-Key": key, "Content-Type": "application/json" },
      });
      const data = await res.json();
      status.textContent = data.ok ? "✅ 连接成功！" : "❌ " + data.error;
    } catch (_) {
      status.textContent = "❌ 网络错误";
    } finally {
      testBtn.disabled = false;
    }
  });
})();
</script>
{% endblock %}
