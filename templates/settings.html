{% extends "base.html" %}
{% block title %}{{ t.settings }} · The Root{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ t.settings }}</h1>
</div>

<div class="form-card" style="max-width:560px;">
  <div class="form-section">
    <h2>Gemini API Key</h2>
    <p style="font-size:.88rem;color:var(--gray-600);margin-bottom:1rem;line-height:1.6;">
      {{ t.gemini_desc1 }}<br>
      {{ t.gemini_desc2 }}<br>
      <a href="https://aistudio.google.com/apikey" target="_blank"
         style="color:var(--green-600);">{{ t.get_key }}</a>
    </p>

    <div class="form-group">
      <label for="gemini-key">API Key</label>
      <div style="display:flex;gap:.5rem;">
        <input id="gemini-key" type="password" placeholder="AIza..."
               style="flex:1;" autocomplete="off" />
        <button id="toggle-visibility" type="button" class="btn btn-ghost btn-sm">👁</button>
      </div>
      <small id="key-status" class="field-hint"></small>
    </div>

    <div style="display:flex;gap:.75rem;flex-wrap:wrap;">
      <button id="save-key" class="btn">{{ t.save }}</button>
      <button id="clear-key" class="btn btn-ghost">{{ t.clear_key }}</button>
      <button id="test-key" class="btn btn-ghost">{{ t.test_connection }}</button>
    </div>
  </div>
</div>

<script>
(function () {
  const T = window.APP_T || {};
  const input   = document.getElementById("gemini-key");
  const status  = document.getElementById("key-status");
  const saveBtn = document.getElementById("save-key");
  const clearBtn= document.getElementById("clear-key");
  const testBtn = document.getElementById("test-key");
  const toggle  = document.getElementById("toggle-visibility");

  const saved = localStorage.getItem("gemini_api_key") || "";
  if (saved) { input.value = saved; status.textContent = T.key_saved || "✅ Saved"; }

  toggle.addEventListener("click", () => {
    input.type = input.type === "password" ? "text" : "password";
  });

  saveBtn.addEventListener("click", () => {
    const key = input.value.trim();
    if (!key) { status.textContent = T.key_enter || "⚠️ Please enter a key"; return; }
    localStorage.setItem("gemini_api_key", key);
    status.textContent = T.key_saved || "✅ Saved";
  });

  clearBtn.addEventListener("click", () => {
    localStorage.removeItem("gemini_api_key");
    input.value = "";
    status.textContent = T.key_cleared || "🗑 Cleared";
  });

  testBtn.addEventListener("click", async () => {
    const key = input.value.trim();
    if (!key) { status.textContent = T.key_enter_first || "⚠️ Please enter a key first"; return; }
    testBtn.disabled = true;
    status.textContent = T.testing || "Testing…";
    try {
      const res  = await fetch("/api/test-key", {
        method: "POST",
        headers: { "X-Gemini-Key": key, "Content-Type": "application/json" },
      });
      const data = await res.json();
      status.textContent = data.ok ? (T.connected || "✅ Connected!") : "❌ " + data.error;
    } catch (_) {
      status.textContent = T.network_error || "❌ Network error";
    } finally {
      testBtn.disabled = false;
    }
  });
})();
</script>
{% endblock %}
