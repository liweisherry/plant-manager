{% extends "base.html" %}
{% block title %}{{ "Edit Plant" if plant else "Add Plant" }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ "Edit Plant" if plant else "Add Plant" }}</h1>
  {% if plant %}
  <a href="/plants/{{ plant.id }}" class="btn btn-ghost">Cancel</a>
  {% else %}
  <a href="/" class="btn btn-ghost">Cancel</a>
  {% endif %}
</div>

<form
  method="post"
  action="{{ '/plants/' ~ plant.id ~ '/edit' if plant else '/plants/new' }}"
  class="form-card"
  id="plant-form"
>
  <div class="form-section">
    <h2>Details</h2>

    <div class="form-group">
      <label for="name">Name <span class="required">*</span></label>
      <input id="name" name="name" type="text" required
             list="name-datalist" autocomplete="off"
             value="{{ plant.name if plant else '' }}" placeholder="e.g. Rainbow Succulent" />
      <datalist id="name-datalist"></datalist>
      <small id="name-hint" class="field-hint"></small>
    </div>

    <div class="form-group">
      <label for="species">Species / Latin Name</label>
      <input id="species" name="species" type="text" autocomplete="off"
             value="{{ plant.species or '' }}"
             placeholder="e.g. Sedum rubrotinctum (auto-filled from suggestions)" />
    </div>

    <div class="form-group">
      <label for="location">Location</label>
      <input id="location" name="location" type="text"
             value="{{ plant.location or '' }}" placeholder="e.g. Living room window" />
    </div>
    <div class="form-group">
      <label for="purchase_date">Date Acquired</label>
      <input id="purchase_date" name="purchase_date" type="date"
             value="{{ plant.purchase_date.isoformat() if plant and plant.purchase_date else '' }}" />
    </div>
    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" rows="3"
                placeholder="Care tips, source, etc…">{{ plant.notes or '' }}</textarea>
    </div>
  </div>

  <div class="form-section">
    <h2>Care Schedule</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="water_days">Watering Interval (days)</label>
        <input id="water_days" name="water_days" type="number" min="1" max="365"
               value="{{ schedules.water.frequency_days if schedules and 'water' in schedules else 7 }}" />
      </div>
      <div class="form-group">
        <label for="fertilize_days">Fertilising Interval (days)</label>
        <input id="fertilize_days" name="fertilize_days" type="number" min="1" max="365"
               value="{{ schedules.fertilize.frequency_days if schedules and 'fertilize' in schedules else 30 }}" />
      </div>
    </div>
  </div>

  <div id="care-tips-section" class="form-section" hidden>
    <h2>🌿 AI Care Tips <span id="care-tips-plant-name" style="font-weight:400;color:var(--gray-400);font-size:.9rem;"></span></h2>
    <div id="care-tips-content" class="care-tips-grid"></div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn">{{ "Save Changes" if plant else "Add Plant" }}</button>
  </div>
</form>
{% endblock %}
